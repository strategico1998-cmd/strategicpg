    <meta name="keywords" content="auditoria marketing digital gratuita, consultoria publicidad Colombia, agencia Bogotá, estrategia marketing empresas, diagnóstico digital Medellín Cali">

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">SAPIENS<span class="accent-text">.</span></a>
            <ul class="nav-links">
                <li><a href="/">Inicio</a></li>
                <li><a href="/servicios/">Servicios</a></li>
                <li><a href="/recursos/">Recursos</a></li>
                <li><a href="/blog/">Blog</a></li>
                <li><a href="/auditoria-gratuita/" class="active">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <main class="section" style="padding-top: 10rem;">
        <div class="container" style="max-width: 800px; text-align: center;">
            <h1 class="reveal">DIAGNÓSTICO <span class="accent-text">ESTRATÉGICO.</span></h1>
            <p class="reveal" style="margin-bottom: 4rem;">Completa el formulario para analizar la salud técnica de tu ecosistema digital.</p>
            
            <form id="sapiens-form" style="background: rgba(255,255,255,0.02); padding: 3rem; border-radius: 20px; border: 1px solid var(--glass-border); text-align: left;">
                <input type="hidden" id="form-service" value="Auditoria Pagina Contacto">
                <input type="hidden" id="form-base-msg" value="Hola SAPIENS, solicito mi auditoría desde la página de contacto.">
                
                <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <div class="form-group"><label>Nombre Completo</label><input type="text" id="name" required placeholder="Ej. Juan Pérez"></div>
                    <div class="form-group"><label>WhatsApp Directo</label><input type="tel" id="phone" required placeholder="+57..."></div>
                </div>
                <div class="form-group" style="margin-top: 2rem;"><label>Correo Corporativo</label><input type="email" id="email" required placeholder="tu@empresa.com"></div>
                <div class="form-group" style="margin-top: 2rem;">
                    <label>Principal desafío actual</label>
                    <select id="industry" required>
                        <option value="Escalamiento">Escalamiento de campañas</option>
                        <option value="Conversion">Baja tasa de conversión</option>
                        <option value="Arquitectura">Fallas técnicas en funnel</option>
                        <option value="Otros">Otro</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-large" style="width: 100%; margin-top: 3rem;">RESERVAR AUDITORÍA</button>
            </form>
        </div>
    </main>
